<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>speedtype</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: clamp(10px, 4vw, 30px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.2s, color 0.2s;
        }

        .game-wrapper {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
        }
        
        h1 { 
            margin-bottom: 5px; 
            text-transform: lowercase; 
            font-family: serif; 
            font-size: clamp(28px, 6vw, 42px);
        }

        hr {
            margin-bottom: 20px;
            border: 0;
            border-top: 1px solid #888888;
        }
        
        body.dark-theme {
            background-color: #121212;
            color: #ffffff;
        }
        body.dark-theme .race-viewport {
            background-color: #1e1e1e;
            border-color: #555555;
        }
        body.dark-theme .stats-box {
            background-color: #1a1a1a;
            border-color: #ffffff;
        }
        body.dark-theme input[type="text"] {
            background-color: #222222;
            color: #ffffff;
            border-color: #555555;
        }

        .race-viewport {
            border: 2px inset #888888;
            background-color: #f0f0f0;
            overflow: hidden;
            position: relative;
            margin: 20px 0;
            height: clamp(55px, 10vw, 75px);
            display: flex;
            align-items: center;
        }
        
        .race-viewport.flash-error {
            background-color: #ff3333 !important;
        }
        body.dark-theme .race-viewport.flash-error {
            background-color: #cc0000 !important;
        }
        
        .target-line {
            position: absolute;
            left: 50px; 
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #ff0000;
            z-index: 10;
        }

        #text-track {
            font-family: monospace;
            font-size: clamp(20px, 4.5vw, 32px);
            white-space: pre; 
            position: absolute;
            left: 0;
            transform: translateX(50px); 
            transition: transform 0.1s ease-out;
        }

        .completed-text { color: #888888; }

        input[type="text"] {
            width: 100%;
            font-size: 16px;
            font-family: monospace;
            padding: clamp(10px, 2.5vw, 15px);
            margin-bottom: 15px;
            border: 2px solid #888888;
            border-radius: 4px;
        }
        
        .stats-box {
            border: 1px solid #000000;
            padding: clamp(10px, 2.5vw, 15px);
            margin-bottom: 15px;
            background-color: #fafafa;
            font-size: clamp(14px, 2.5vw, 18px);
            line-height: 1.5;
        }
        
        .controls {
            margin-bottom: 5px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
            font-size: clamp(14px, 2.5vw, 18px);
        }

        .selectors {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        button, select { 
            padding: clamp(5px, 1.5vw, 8px) clamp(10px, 2vw, 15px); 
            cursor: pointer; 
            font-size: clamp(13px, 2.2vw, 16px);
        }

        #action-btn {
            width: 100%;
            padding: clamp(10px, 2vw, 14px);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1>speedtype</h1>
        <hr>

        <div class="controls">
            <div class="selectors">
                <div>
                    <label for="lang-select">lang: </label>
                    <select id="lang-select" onchange="generateNewPhrase()">
                        <option value="en" selected>english</option>
                        <option value="ru">russian</option>
                    </select>
                </div>
                <div>
                    <label for="mode-select">mode: </label>
                    <select id="mode-select" onchange="generateNewPhrase()">
                        <option value="normal">normal (10 words)</option>
                        <option value="endless">endless loop</option>
                    </select>
                </div>
            </div>
            <button onclick="toggleTheme()">theme: light/dark</button>
        </div>

        <div class="race-viewport" id="viewport-box">
            <div class="target-line"></div>
            <div id="text-track">loading...</div>
        </div>

        <input type="text" id="type-input" placeholder="type here..." autocomplete="off" autocapitalize="off" spellcheck="false" autocorrect="off">

        <div class="stats-box">
            time: <span id="timer-val">0.0</span>s<br>
            speed: <span id="wpm-val">0</span> wpm<br>
            total words: <span id="words-val">0</span><br>
            errors: <span id="error-val">0</span>
        </div>

        <button id="action-btn" onclick="handleActionButton()">reset / next</button>
    </div>

        let targetText = "";
        let currentIndex = 0; 
        let startTime = null;
        let timerInterval = null;
        let isRunning = false;
        let isGameOver = false;
        let errorCount = 0;
        let flashTimeout = null;

        const track = document.getElementById('text-track');
        const input = document.getElementById('type-input');
        const viewportBox = document.getElementById('viewport-box');
        const timerDisp = document.getElementById('timer-val');
        const wpmDisp = document.getElementById('wpm-val');
        const wordsDisp = document.getElementById('words-val');
        const errorDisp = document.getElementById('error-val');
        const langSelect = document.getElementById('lang-select');
        const modeSelect = document.getElementById('mode-select');
        const actionBtn = document.getElementById('action-btn');

        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' || e.key === 'Delete') {
                e.preventDefault();
            }
        });

        input.addEventListener('paste', (e) => {
            e.preventDefault();
        });

        function getActivePool() {
            return langSelect.value === 'ru' ? wordPoolRu : wordPoolEn;
        }

        function generateNewPhrase() {
            clearInterval(timerInterval);
            clearTimeout(flashTimeout);
            viewportBox.classList.remove('flash-error');
            
            const currentMode = modeSelect.value;
            const activePool = getActivePool();
            let chosenWords = [];
            const wordCount = 10; 
            
            for (let i = 0; i < wordCount; i++) {
                const randomIndex = Math.floor(Math.random() * activePool.length);
                chosenWords.push(activePool[randomIndex]);
            }
            
            targetText = chosenWords.join(' ') + (currentMode === 'endless' ? ' ' : '');
            
            track.innerText = targetText;
            track.style.transform = "translateX(50px)";
            
            input.value = "";
            input.disabled = false;
            input.style.backgroundColor = "";
            input.focus();
            
            currentIndex = 0;
            startTime = null;
            isRunning = false;
            isGameOver = false;
            errorCount = 0;
            
            timerDisp.innerText = "0.0";
            wpmDisp.innerText = "0";
            wordsDisp.innerText = "0";
            errorDisp.innerText = "0";
            actionBtn.innerText = currentMode === 'endless' ? "stop run" : "reset / next";
        }

        function handleActionButton() {
            const currentMode = modeSelect.value;
            if (currentMode === 'endless' && isRunning && !isGameOver) {
                clearInterval(timerInterval);
                input.disabled = true;
                input.style.backgroundColor = "#eeeeee";
                isGameOver = true;
                actionBtn.innerText = "new run";
            } else {
                generateNewPhrase();
            }
        }

        input.addEventListener('input', (e) => {
            if (isGameOver) {
                input.value = "";
                return;
            }
            
            const typedVal = input.value;
            if (typedVal.length === 0) return; 

            if (!isRunning) {
                isRunning = true;
                startTime = new Date();
                timerInterval = setInterval(updateClock, 100);
            }

            const expectedChunk = targetText.substring(currentIndex, currentIndex + typedVal.length);

            if (typedVal === expectedChunk) {
                currentIndex += typedVal.length;
                track.style.transform = `translateX(calc(50px - ${currentIndex}ch))`;
                
                const done = targetText.substring(0, currentIndex);
                const remaining = targetText.substring(currentIndex);
                track.innerHTML = `<span class="completed-text">${done}</span>${remaining}`;

                const currentMode = modeSelect.value;

                let completedWords = (done.match(/ /g) || []).length;
                if (currentMode === 'normal' && currentIndex >= targetText.length) {
                    completedWords = targetText.split(' ').length;
                }
                wordsDisp.innerText = completedWords;

                if (currentMode === 'endless' && typedVal.endsWith(' ')) {
                    const activePool = getActivePool();
                    const nextRandomWord = activePool[Math.floor(Math.random() * activePool.length)];
                    targetText += nextRandomWord + ' ';
                    track.innerHTML = `<span class="completed-text">${targetText.substring(0, currentIndex)}</span>${targetText.substring(currentIndex)}`;
                }

                if (currentMode === 'normal' && currentIndex >= targetText.length) {
                    clearInterval(timerInterval);
                    input.disabled = true;
                    input.style.backgroundColor = "#ddffdd";
                    isGameOver = true;
                    updateClock();
                }
            } else {
                errorCount++;
                errorDisp.innerText = errorCount;
                
                clearTimeout(flashTimeout);
                viewportBox.classList.add('flash-error');
                
                flashTimeout = setTimeout(() => {
                    viewportBox.classList.remove('flash-error');
                }, 60);
            }

            input.value = "";
        });

        function updateClock() {
            if (!startTime) return;
            const elapsedSeconds = (new Date() - startTime) / 1000;
            timerDisp.innerText = elapsedSeconds.toFixed(1);

            const minutes = elapsedSeconds / 60;
            if (minutes > 0) {
                const wpm = Math.round((currentIndex / 5) / minutes);
                wpmDisp.innerText = wpm > 0 ? wpm : 0;
            }
        }

        window.onload = generateNewPhrase;
    </script>

        function updateClock() {
            if (!startTime) return;
            const elapsedSeconds = (new Date() - startTime) / 1000;
            timerDisp.innerText = elapsedSeconds.toFixed(1);

            const minutes = elapsedSeconds / 60;
            if (minutes > 0) {
                const wpm = Math.round((currentIndex / 5) / minutes);
                wpmDisp.innerText = wpm > 0 ? wpm : 0;
            }
        }

        window.onload = generateNewPhrase;
    </script>

</body>
